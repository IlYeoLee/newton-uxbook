<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>NEWTON — UX Book</title>
<style>
  @font-face{
    font-family:'Pretendard';font-weight:400;font-style:normal;font-display:swap;
    src:url('fonts/Pretendard-Regular.woff2') format('woff2');
  }
  @font-face{
    font-family:'Pretendard';font-weight:700;font-style:normal;font-display:swap;
    src:url('fonts/Pretendard-Bold.woff2') format('woff2');
  }
  @property --s1{syntax:'<percentage>';inherits:false;initial-value:58%}
  @property --s2{syntax:'<percentage>';inherits:false;initial-value:83%}
  @property --s3{syntax:'<percentage>';inherits:false;initial-value:93.5%}
  :root{
    --red:#FA3030;
    --gray-bg:#F6F6F6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}

  /* custom cursor = the vector logo, FA3030 with Figma "exclusion" blend, on desktop only */
  .cursor{
    position:fixed;top:0;left:0;z-index:9999;pointer-events:none;display:none;
    width:42px;height:18px;background:#FA3030;
    -webkit-mask:url(assets/cursor.svg) center/contain no-repeat;
    mask:url(assets/cursor.svg) center/contain no-repeat;
    mix-blend-mode:exclusion;
    transform:translate(-9999px,-9999px);will-change:transform;
  }
  .cursor.clicking{
    width:26px;height:26px;
    -webkit-mask-image:url(assets/cursor-click.svg);
    mask-image:url(assets/cursor-click.svg);
  }
  @media (hover:hover) and (pointer:fine){
    .cursor{display:block}
    html,body,a,button,summary,.pill,.pg-btn,img,.wordmark,figure.figure{cursor:none}
  }
  body{
    margin:0;
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    font-weight:400;
    background:#000;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  img{max-width:100%;display:block}

  .device{display:flex;position:relative}
  .book{
    position:relative;
    width:min(100vw, 100vh * 1.6003);
    width:min(100vw, 100dvh * 1.6003);   /* dvh: fills tablet screen under changing browser chrome */
    aspect-ratio:1205/753;
    background:#fff;
    overflow:hidden;
    container-type:inline-size;
    /* no shadow at rest — on a full-bleed tablet it showed as a faint grey line at the top edge */
  }

  /* Desktop/laptop (mouse): wrap the book in a Galaxy-Tab-style bezel.
     Touch tablets report pointer:coarse and stay fullscreen. */
  @media (hover:hover) and (pointer:fine){
    body{padding:2.4vh}
    .device{
      padding:1.4vh;
      background:linear-gradient(150deg,#1a1a1e,#08080a);
      border-radius:2.4vh;
      box-shadow:0 3vh 9vh rgba(0,0,0,.6), inset 0 0 0 .2vh #2d2d31;
    }
    .book{
      width:min(100vw - 20vh, (100vh - 20vh) * 1.6003);   /* smaller tablet, more black margin around it */
      border-radius:1vh;
    }
    .device::after{
      content:"";position:absolute;top:50%;left:.65vh;
      width:.7vh;height:.7vh;border-radius:50%;background:#3a3a3e;transform:translateY(-50%);
    }
  }

  /* ---- top nav (Figma Frame 6) ---- */
  .book-nav{
    height:5.394cqw;display:flex;align-items:center;justify-content:space-between;
    padding:0 3.320cqw;
    border-bottom:1px solid rgba(0,0,0,.06);
    background:#fff;position:relative;z-index:6;
  }
  .brand{display:flex;align-items:center;cursor:pointer;text-decoration:none;flex:none}
  .brand img{height:1.742cqw;width:auto}
  .pillbar{display:flex;gap:1.66cqw;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0;justify-content:flex-end;align-items:flex-end}
  .pillbar::-webkit-scrollbar{display:none}
  /* underline tab (two-weight style): grey→black text, FA3030 underline on active */
  .pill{
    flex:none;border:none;cursor:pointer;position:relative;
    background:transparent;padding:0 0 0.55cqw;
    color:#9a9a9a;font-size:1.245cqw;font-weight:400;white-space:nowrap;
    font-family:inherit;letter-spacing:-.02em;
    transition:color .3s ease;
  }
  .pill::after{
    content:"";position:absolute;left:0;bottom:0;width:100%;height:0.166cqw;
    background:var(--red);transform:scaleX(0);transform-origin:left;
    transition:transform .45s cubic-bezier(.65,0,.35,1);
  }
  .pill:hover{color:#000}
  .pill.active{color:#000;font-weight:700}
  .pill.active::after{transform:scaleX(1)}

  /* ---- stage ---- */
  .stage{position:relative;height:56.93cqw;overflow:hidden}
  .book.is-cover .stage{height:62.49cqw}
  .book.is-cover .book-nav{display:none}

  /* pages stacked; simple cross-fade between them */
  .page{
    position:absolute;inset:0;padding:0.830cqw;display:flex;gap:0;
    opacity:0;pointer-events:none;transition:opacity .3s ease;
  }
  .page[data-page="cover"]{padding:0}
  .page.active{opacity:1;pointer-events:auto;z-index:2}

  /* per-element slide-in ("차라락") — soft ease-out, a touch slower */
  @keyframes slideInItem{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  .stagger{opacity:0;animation:slideInItem .62s cubic-bezier(.22,.61,.36,1) both}

  .page-media{
    width:32.780cqw;height:100%;flex:none;position:relative;
  }
  .page-media img{width:100%;height:100%;object-fit:cover;border-radius:3.320cqw;display:block}

  .page-text{
    flex:1;min-width:0;height:100%;overflow-y:auto;
    padding:3.320cqw 6.639cqw;scrollbar-width:none;
  }
  .page-text::-webkit-scrollbar{display:none}

  .kicker{color:var(--red);font-weight:700;font-size:1.494cqw;margin:0 0 1.328cqw;letter-spacing:-.02em}
  .chapter-title{font-size:2.656cqw;font-weight:700;line-height:1.38;margin:0 0 1.660cqw;letter-spacing:-.03em}
  .body{font-size:1.494cqw;font-weight:400;color:rgba(0,0,0,.8);line-height:1.55;margin:0 0 1.328cqw}
  .body a{color:var(--red);text-decoration:underline}
  .subhead{font-size:1.494cqw;font-weight:700;margin:1.992cqw 0 0.498cqw}
  .subhead:first-child{margin-top:0}
  .list{margin:0.996cqw 0;padding-left:1.660cqw;color:rgba(0,0,0,.8);font-size:1.494cqw;font-weight:400}
  .list li{margin:0.415cqw 0}

  figure.figure{margin:1.660cqw 0;cursor:zoom-in;line-height:0}
  figure.figure img{width:100%;height:auto;display:block;border-radius:1.660cqw}

  blockquote.quote{
    font-size:1.826cqw;font-weight:700;color:var(--red);
    border-left:0.249cqw solid var(--red);
    margin:1.992cqw 0;padding:0.332cqw 0 0.332cqw 1.494cqw;
  }

  .group{background:var(--gray-bg);border-radius:2.656cqw;padding:0.830cqw;margin:1.660cqw 0}
  details.toggle{margin:0.664cqw}
  details.toggle>summary{
    list-style:none;cursor:pointer;display:flex;align-items:center;gap:0.830cqw;
    font-weight:700;font-size:1.328cqw;padding:0.996cqw 0.664cqw;border-radius:1.162cqw;
  }
  details.toggle>summary::-webkit-details-marker{display:none}
  details.toggle>summary::before{content:"▸";display:inline-block;font-size:1.25em;line-height:1;transition:transform .15s}
  details.toggle[open]>summary::before{transform:rotate(90deg)}
  details.toggle .toggle-body{padding:0.332cqw 0.664cqw 0.996cqw 1.494cqw}
  details.toggle details.toggle{background:rgba(255,255,255,.55);border-radius:1.162cqw}

  .finding{display:flex;gap:0.996cqw;background:#fff;border-radius:1.660cqw;padding:1.328cqw;margin:0.830cqw 0}
  .finding-icon{font-size:1.660cqw;flex:none;width:2.656cqw;height:2.656cqw;display:flex;align-items:center;justify-content:center}
  .finding-body{flex:1;min-width:0}
  .finding-label{font-size:1.079cqw;color:rgba(0,0,0,.4);font-weight:400;margin:0 0 0.332cqw}
  .finding-headline{font-size:1.328cqw;font-weight:700;margin:0 0 0.830cqw;line-height:1.4}

  .table-wrap{overflow-x:auto;margin:1.328cqw 0;border-radius:1.328cqw;border:1px solid rgba(0,0,0,.08)}
  table{width:100%;border-collapse:collapse;font-size:1.079cqw;min-width:52cqw}
  th,td{text-align:left;padding:0.996cqw;border-bottom:1px solid rgba(0,0,0,.06);vertical-align:top;font-weight:400}
  th{background:#fafafa;font-weight:700;white-space:nowrap}
  tr:last-child td{border-bottom:none}

  .step-head{margin:3.320cqw 0 0.996cqw}
  .step-head:first-child{margin-top:0.664cqw}
  .step-label{color:var(--red);font-weight:700;font-size:1.162cqw;margin:0 0 0.498cqw}
  .step-title{font-size:1.826cqw;font-weight:700;margin:0;letter-spacing:-.02em}

  .appendix-title{font-size:2.656cqw;font-weight:700;margin:0 0 1.660cqw}

  /* ---- cover (Figma 표지) ---- */
  .cover-slide{
    position:relative;width:100%;height:100%;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    /* Figma colors; #D1FEFF pinned at 100% so the bright bottom is never clipped.
       Middle stops sweep for a clear flowing motion. */
    background:linear-gradient(180deg,#FA3030 var(--s1,58%),#FE6E3C var(--s2,83%),#FEC389 var(--s3,93.5%),#D1FEFF 100%);
    animation:gradFlow 8s ease-in-out infinite alternate;
  }
  @keyframes gradFlow{
    from{--s1:48%;--s2:72%;--s3:88%}
    to{--s1:65%;--s2:91%;--s3:97%}
  }
  @media (prefers-reduced-motion:reduce){.cover-slide{animation:none}}
  .cover-slide .wordmark{width:72.20cqw;height:auto;margin-bottom:0.5cqw;cursor:pointer;touch-action:none;user-select:none;-webkit-user-drag:none;-webkit-user-select:none}
  /* glitch: black-only sliced jitter (no color split) while touched/rubbed */
  @keyframes glitch{
    0%,100%{transform:translate(0);clip-path:none}
    10%{transform:translate(-3px,1px)}
    25%{transform:translate(3px,-1px);clip-path:inset(8% 0 62% 0)}
    40%{transform:translate(-2px,1px);clip-path:inset(56% 0 18% 0)}
    55%{transform:translate(2px,0);clip-path:inset(34% 0 40% 0)}
    70%{transform:translate(-1px,-1px)}
    85%{transform:translate(1px,1px);clip-path:none}
  }
  .cover-slide .wordmark.glitch{animation:glitch .38s steps(2,end)}
  .cover-slide p{font-size:1.577cqw;font-weight:700;color:#000;margin:0;letter-spacing:-.02em}

  /* ---- pager (Figma Frame 2147232169) — anchored to book so cover & content align ---- */
  .pager{
    position:absolute;left:0.830cqw;right:0.830cqw;top:31cqw;
    display:flex;justify-content:space-between;align-items:flex-start;
    pointer-events:none;z-index:8;
  }
  .pg-btn{
    pointer-events:auto;position:relative;overflow:hidden;
    width:4.979cqw;height:4.979cqw;border-radius:6.639cqw;
    background:rgba(255,255,255,.3);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;
    color:#000;padding:0;
  }
  .ripple{
    position:absolute;border-radius:50%;background:rgba(0,0,0,.16);
    transform:scale(0);pointer-events:none;animation:ripple .6s ease-out;
  }
  @keyframes ripple{to{transform:scale(2.6);opacity:0}}
  .pg-btn svg{width:1.992cqw;height:1.992cqw;display:block}
  .pg-btn:disabled{opacity:.3;cursor:default}
  .pg-right{display:flex;flex-direction:column;align-items:center;gap:0.996cqw}
  .pg-right .count{font-size:1.162cqw;letter-spacing:-.02em}
  .pg-right .count .cur{color:#6a6a6a;font-weight:700}
  .pg-right .count .tot{color:#c8c8c8;font-weight:400}
  .book.is-cover .pg-right .count .cur{color:#1e1e1e}
  .book.is-cover .pg-right .count .tot{color:rgba(0,0,0,.4)}

  /* lightbox (Figma 이미지 확대) — anchored to the book so it stays inside the tablet screen */
  .lightbox{position:absolute;inset:0;background:rgba(60,60,60,.96);display:none;z-index:100;border-radius:inherit;overflow:hidden}
  .lightbox.open{display:block}
  .lb-stage{position:absolute;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:none}
  .lb-stage img{max-width:86%;max-height:78%;object-fit:contain;border-radius:8px;transform-origin:center center;will-change:transform;user-select:none;-webkit-user-drag:none;cursor:grab}
  .lb-stage img.grabbing{cursor:grabbing}
  .lb-controls{
    position:absolute;left:50%;bottom:3cqw;transform:translateX(-50%);
    display:flex;align-items:center;gap:12px;z-index:2;
    font-family:inherit;
  }
  .lb-stepper{
    display:flex;align-items:stretch;height:48px;
    background:#fff;border-radius:24px;overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.25);
  }
  .lb-stepper button{
    border:none;cursor:pointer;background:#fff;color:#000;
    width:52px;font-size:22px;font-weight:400;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0;
    position:relative;overflow:hidden;
  }
  .lb-stepper button:hover{background:#f2f2f2}
  #lbZoom{
    display:flex;align-items:center;justify-content:center;min-width:64px;padding:0 6px;
    font-size:15px;font-weight:700;color:#000;
    border-left:1px solid #ececec;border-right:1px solid #ececec;
  }
  .lb-close{
    width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
    background:#fff;color:#000;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 20px rgba(0,0,0,.25);
    position:relative;overflow:hidden;
  }
  .lb-close:hover{background:#f2f2f2}
  .lb-close svg{width:20px;height:20px}
</style>
</head>
<body>

<div class="cursor" id="cursor" aria-hidden="true"></div>

<div class="device">
<div class="book is-cover" id="book">
  <div class="book-nav">
    <a class="brand" href="#" data-nav="cover"><img src="assets/wordmark.svg" alt="NEWTON"></a>
    <div class="pillbar">{{NAV}}</div>
  </div>
  <div class="stage">
    <div class="page active" data-page="cover">
      <div class="cover-slide">
        <img class="wordmark" src="assets/wordmark.svg" alt="NEWTON" draggable="false">
        <p>UX Book</p>
      </div>
    </div>

    <div class="page" data-page="intro">
      <div class="page-media">{{INTRO_MEDIA}}</div>
      <div class="page-text">{{INTRO_TEXT}}</div>
    </div>

    {{SECTIONS}}

    <div class="page" data-page="appendix">
      <div class="page-media"><img src="assets/img_43.png" alt=""></div>
      <div class="page-text">
        <p class="appendix-title">Wireframe &amp; Simulator</p>
        {{APPENDIX}}
      </div>
    </div>

  </div>
  <div class="pager">
    <button id="prevBtn" class="pg-btn" aria-label="이전">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="pg-right">
      <button id="nextBtn" class="pg-btn" aria-label="다음">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="count" id="counter">1 / 12</span>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lb-stage" id="lbStage"><img id="lbImg" src="" alt="" draggable="false"></div>
    <div class="lb-controls">
      <div class="lb-stepper">
        <button id="lbMinus" aria-label="축소">&minus;</button>
        <span id="lbZoom">100%</span>
        <button id="lbPlus" aria-label="확대">+</button>
      </div>
      <button id="lbClose" class="lb-close" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</div>
</div>

<script>
  const book = document.getElementById('book');
  const pages = [...document.querySelectorAll('.page')];
  const ids = pages.map(p => p.dataset.page);
  const pills = [...document.querySelectorAll('.pill')];
  const counter = document.getElementById('counter');
  let idx = 0;

  function updateChrome(){
    book.classList.toggle('is-cover', ids[idx] === 'cover');
    pills.forEach(p => p.classList.toggle('active', p.dataset.members.split(',').includes(ids[idx])));
    counter.innerHTML = '<span class="cur">' + (idx + 1) + '</span><span class="tot"> / ' + pages.length + '</span>';
    document.getElementById('prevBtn').disabled = idx === 0;   // next never disabled: wraps last → first
  }

  // stagger the page's own elements in from the top ("차라락"), any direction
  function staggerIn(page){
    const items = [page.querySelector('.page-media'),
                   ...page.querySelectorAll('.page-text > *')].filter(Boolean);
    items.forEach((el, n) => {
      el.classList.remove('stagger');
      void el.offsetWidth;                    // restart animation
      el.style.animationDelay = (n * 55) + 'ms';
      el.classList.add('stagger');
    });
  }

  function show(i){
    i = Math.max(0, Math.min(pages.length - 1, i));
    if (i === idx) return;
    idx = i;
    pages.forEach((p, n) => p.classList.toggle('active', n === i));
    pages[i].querySelector('.page-text')?.scrollTo(0, 0);
    updateChrome();
    staggerIn(pages[i]);   // slide-in plays going forward AND backward
  }

  // ripple on the round chevron buttons
  function addRipple(e){
    const btn = e.currentTarget, rect = btn.getBoundingClientRect();
    const d = Math.max(rect.width, rect.height);
    const r = document.createElement('span');
    r.className = 'ripple';
    r.style.width = r.style.height = d + 'px';
    r.style.left = (e.clientX - rect.left - d / 2) + 'px';
    r.style.top = (e.clientY - rect.top - d / 2) + 'px';
    btn.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  const prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn');
  const nextIdx = () => idx >= pages.length - 1 ? 0 : idx + 1;   // wrap last → first
  prevBtn.addEventListener('click', e => { addRipple(e); show(idx - 1); });
  nextBtn.addEventListener('click', e => { addRipple(e); show(nextIdx()); });
  document.querySelector('[data-nav="cover"]').addEventListener('click', e => { e.preventDefault(); show(0); });
  pills.forEach(p => p.addEventListener('click', e => {
    e.preventDefault();
    show(ids.indexOf(p.dataset.target));
  }));

  // logo glitch: fires automatically once every 5s
  const wm = document.querySelector('.cover-slide .wordmark');
  function glitch(){ if (!wm.classList.contains('glitch')) wm.classList.add('glitch'); }
  wm.addEventListener('animationend', () => wm.classList.remove('glitch'));
  setInterval(glitch, 5000);

  // toggle: springy height grow + single fade (no per-child flicker)
  function expandToggle(d, body){
    d.open = true;
    body.style.overflow = 'hidden';
    body.style.height = 'auto';
    const h = body.scrollHeight;
    body.style.height = '0px'; body.style.opacity = '0';
    void body.offsetHeight;   // commit start state, then transition
    body.style.transition = 'height .3s cubic-bezier(.22,.61,.36,1), opacity .26s ease';
    body.style.height = h + 'px'; body.style.opacity = '1';
    body.addEventListener('transitionend', function done(e){
      if (e.propertyName !== 'height') return;
      body.style.height = 'auto'; body.style.overflow = ''; body.style.transition = '';
      body.removeEventListener('transitionend', done);
    });
  }
  function collapseToggle(d, body){
    body.style.overflow = 'hidden';
    body.style.height = body.scrollHeight + 'px';
    void body.offsetHeight;
    body.style.transition = 'height .24s cubic-bezier(.4,0,.2,1), opacity .18s ease';
    body.style.height = '0px'; body.style.opacity = '0';
    body.addEventListener('transitionend', function done(e){
      if (e.propertyName !== 'height') return;
      d.open = false;
      body.style.height = ''; body.style.opacity = ''; body.style.overflow = ''; body.style.transition = '';
      body.removeEventListener('transitionend', done);
    });
  }
  document.querySelectorAll('details.toggle').forEach(d => {
    const sum = d.querySelector(':scope > summary');
    const body = d.querySelector(':scope > .toggle-body');
    if (!sum || !body) return;
    sum.addEventListener('click', e => {
      e.preventDefault();
      d.open ? collapseToggle(d, body) : expandToggle(d, body);
    });
  });
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') show(nextIdx());
    if (e.key === 'ArrowLeft') show(idx - 1);
  });

  // Double-tap on the COVER (page 1) only → go fullscreen.
  // Browsers won't let us block exit (Esc/back is always allowed); on Android the
  // physical back button is the intended way out, matching the kiosk request.
  function goFullscreen(){
    const el = document.documentElement;
    if (!document.fullscreenElement && el.requestFullscreen) el.requestFullscreen().catch(() => {});
  }
  let lastTap = 0;
  const coverPage = document.querySelector('.page[data-page="cover"]');
  coverPage.addEventListener('pointerup', () => {
    if (ids[idx] !== 'cover') return;
    const now = Date.now();
    if (now - lastTap < 330){ goFullscreen(); lastTap = 0; }
    else lastTap = now;
  });

  // ---- lightbox with zoom / pan / pinch (Figma 이미지 확대) ----
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbZoom = document.getElementById('lbZoom');
  let scale = 1, tx = 0, ty = 0;
  const MIN = 1, MAX = 8, STEP = 0.3;   // +/- steps 30%

  function apply(){
    if (scale <= 1) { tx = 0; ty = 0; }
    lbImg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    lbZoom.textContent = Math.round(scale * 100) + '%';
  }
  function setScale(s){ scale = Math.min(MAX, Math.max(MIN, s)); apply(); }
  function openLb(src){
    lbImg.src = src; scale = 1; tx = 0; ty = 0; apply();
    lightbox.classList.add('open');
    // natural grow-in (it was a small thumbnail → gently scales up)
    lightbox.animate([{opacity:0}, {opacity:1}], {duration:200, easing:'ease-out'});
    lbImg.animate([{transform:'scale(.92)', opacity:.5}, {transform:'scale(1)', opacity:1}],
                  {duration:340, easing:'cubic-bezier(.2,.7,.3,1)'});
  }
  function closeLb(){ lightbox.classList.remove('open'); }

  document.addEventListener('click', e => {
    const fig = e.target.closest('figure.figure img');   // only inline content images, not the fixed media panel
    if (fig) openLb(fig.src);
  });
  document.getElementById('lbClose').addEventListener('click', e => { addRipple(e); closeLb(); });
  document.getElementById('lbPlus').addEventListener('click', e => { addRipple(e); setScale(scale + STEP); });
  document.getElementById('lbMinus').addEventListener('click', e => { addRipple(e); setScale(scale - STEP); });
  window.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

  // wheel zoom
  document.getElementById('lbStage').addEventListener('wheel', e => {
    e.preventDefault();
    setScale(scale + (e.deltaY < 0 ? STEP : -STEP));
  }, { passive: false });

  // drag pan (mouse)
  let dragging = false, sx = 0, sy = 0;
  lbImg.addEventListener('pointerdown', e => {
    if (scale <= 1) return;
    dragging = true; sx = e.clientX - tx; sy = e.clientY - ty;
    lbImg.classList.add('grabbing'); lbImg.setPointerCapture(e.pointerId);
  });
  lbImg.addEventListener('pointermove', e => {
    if (!dragging) return;
    tx = e.clientX - sx; ty = e.clientY - sy; apply();
  });
  lbImg.addEventListener('pointerup', () => { dragging = false; lbImg.classList.remove('grabbing'); });

  // pinch zoom (touch)
  let pinchDist = 0, pinchBase = 1;
  const dist = t => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
  lbImg.addEventListener('touchstart', e => {
    if (e.touches.length === 2) { pinchDist = dist(e.touches); pinchBase = scale; }
  }, { passive: false });
  lbImg.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && pinchDist) {
      e.preventDefault();
      setScale(pinchBase * dist(e.touches) / pinchDist);
    }
  }, { passive: false });
  lbImg.addEventListener('touchend', e => { if (e.touches.length < 2) pinchDist = 0; });

  // smooth (lerped) custom cursor — desktop only
  const cursor = document.getElementById('cursor');
  let mx = innerWidth / 2, my = innerHeight / 2, cx = mx, cy = my;
  addEventListener('pointermove', e => {
    if (e.pointerType === 'touch') return;
    mx = e.clientX; my = e.clientY;
  });
  // hovering an interactive element swaps to the click-cursor icon
  addEventListener('pointerover', e => {
    if (e.pointerType === 'touch') return;
    const hit = e.target.closest && e.target.closest('button, summary, .pill, .pg-btn, figure.figure img, [data-nav], .lb-stepper button, .lb-close');
    cursor.classList.toggle('clicking', !!hit);
  });
  (function follow(){
    cx += (mx - cx) * 0.8; cy += (my - cy) * 0.8;   // near-instant, tiny smoothing only
    cursor.style.transform = `translate(${cx}px,${cy}px) translate(-50%,-50%)`;
    requestAnimationFrame(follow);
  })();

  // init: first page visible without a page-turn
  pages[0].classList.add('active');
  updateChrome();
  staggerIn(pages[0]);
</script>
</body>
</html>
